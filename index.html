<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2318181b'/><stop offset='100%25' stop-color='%23424245'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><rect x='14' y='18' width='26' height='3' rx='1.5' fill='white'/><rect x='14' y='28' width='36' height='3' rx='1.5' fill='white' opacity='0.85'/><rect x='14' y='38' width='22' height='3' rx='1.5' fill='white' opacity='0.6'/><circle cx='46' cy='44' r='10' fill='white'/><path d='M41 44l3.5 3.5L51 41' stroke='%2318181b' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-pane">
            <header>
                <div class="header-row">
                    <div>
                        <h1>待办事项</h1>
                        <p class="subtitle">规划您的一天</p>
                    </div>
                    <button class="theme-toggle" id="theme-toggle" title="切换主题">
                        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="input-section">
                <input type="text" id="todo-input" placeholder="添加新任务...">
                <div class="priority-selector" id="priority-selector">
                    <div class="priority-slider" id="priority-slider"></div>
                    <button class="priority-btn" data-priority="high">高</button>
                    <button class="priority-btn active" data-priority="medium">中</button>
                    <button class="priority-btn" data-priority="low">低</button>
                </div>
                <button id="add-btn">添加</button>
            </div>
        </div>

        <div class="right-pane">
            <div class="filter-row">
                <div class="filter-tabs">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="active">进行中</button>
                    <button class="filter-btn" data-filter="completed">已完成</button>
                </div>
                <button class="clear-completed-btn" id="clear-completed">清除已完成</button>
                <button class="clear-all-btn" id="clear-all">清除全部待办</button>
            </div>

            <div class="todo-list" id="todo-list">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke-linecap="round" stroke-linejoin="round"/>
                        <polyline points="22 4 12 14.01 9 11.01" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h3>暂无任务</h3>
                    <p>添加您的第一个任务开始吧</p>
                </div>
            </div>

            <div class="stats" id="stats" style="display: none;">
                <div class="stat-item">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="active-count">0</div>
                    <div class="stat-label">进行中</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="completed-count">0</div>
                    <div class="stat-label">已完成</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-card">
            <div class="modal-icon" id="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
            <h3 class="modal-title" id="modal-title"></h3>
            <p class="modal-desc" id="modal-desc"></p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">取消</button>
                <button class="modal-btn modal-btn-confirm" id="modal-confirm">确认</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
